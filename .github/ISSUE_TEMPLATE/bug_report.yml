name: Bug report
description: Something's not playing right? Tell us what broke.
title: "[Bug] "
labels:
  - bug
assignees:
  - saraansx

body:
  - type: textarea
    attributes:
      label: What went wrong
      description: Describe what happened and where in Lune it occurred.
      placeholder: Lune crashed / froze / showed wrong data when I...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. 
        2. 
        3.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behaviour
      placeholder: It should have...
    validations:
      required: true

  - type: input
    attributes:
      label: Lune version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, macOS 14, Ubuntu 22.04"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Logs
      description: Paste any relevant console output. Open DevTools with Ctrl+Shift+I.
      value: |
        <details>
        <summary>Console output</summary>

        ```
        paste here
        ```
        </details>
    validations:
      required: false
