name: "🚀 Feature Request"
description: "Suggest an idea or improvement for Lune."
title: "[Feature] "
labels:
  - enhancement
assignees:
  - saraansx

body:
  - type: checkboxes
    attributes:
      label: Before filing
      options:
        - label: I have searched existing issues and this is a new idea
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "Ex. I'm always frustrated when [...]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockup screenshots, or technical ideas about the feature request here.
    validations:
      required: false
