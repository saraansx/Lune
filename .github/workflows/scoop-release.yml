name: Scoop Release
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v1.0.3)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Version Data
        id: version_info
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.event.inputs.tag_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = (Get-Content package.json | ConvertFrom-Json).version
            if ($tag -notmatch "^v") { $tag = "v$tag" }
          }
          
          $version = $tag.TrimStart('v')
          $url = "https://github.com/saraansx/Lune/releases/download/$tag/Lune-Setup-${version}.exe"
          
          Write-Host "Waiting for release assets to be available..."
          $maxRetries = 10
          $retryCount = 0
          $success = $false
          
          while (-not $success -and $retryCount -lt $maxRetries) {
            try {
              $response = Invoke-WebRequest -Method Head -Uri $url -ErrorAction Stop
              if ($response.StatusCode -eq 200) {
                $success = $true
              }
            } catch {
              Write-Host "Attempt $($retryCount + 1): Asset not available yet. Retrying in 30s..."
              Start-Sleep -Seconds 30
              $retryCount++
            }
          }
          
          if (-not $success) {
            Write-Error "Asset not found at $url after $maxRetries attempts."
            exit 1
          }
          
          Write-Host "Downloading $url to calculate hash..."
          Invoke-WebRequest -Uri $url -OutFile "Lune-Setup.exe"
          $hash = (Get-FileHash "Lune-Setup.exe" -Algorithm SHA256).Hash
          Remove-Item "Lune-Setup.exe"
          Write-Host "Calculated Hash: $hash"
          
          # Save for subsequent steps
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
          echo "url=$url" >> $env:GITHUB_OUTPUT

      - name: Update Scoop Manifest
        uses: actions/checkout@v4
        with:
          repository: saraansx/scoop-bucket
          token: ${{ secrets.SCOOP_REPO_TOKEN }}
          path: scoop-bucket-repo

      - name: Modify Scoop JSON
        run: |
          $jsonPath = "scoop-bucket-repo/bucket/lune.json"
          if (-not (Test-Path $jsonPath)) {
            Write-Error "Scoop manifest not found at $jsonPath"
            exit 1
          }
          $json = Get-Content $jsonPath -Raw | ConvertFrom-Json
          $json.version = "${{ steps.version_info.outputs.version }}"
          $json.architecture.'64bit'.url = "${{ steps.version_info.outputs.url }}#/dl.7z"
          $json.architecture.'64bit'.hash = "${{ steps.version_info.outputs.hash }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content $jsonPath

      - name: Commit Scoop Changes
        working-directory: scoop-bucket-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/lune.json
          git commit -m "chore: update lune to ${{ github.event.release.tag_name }}"
          git push origin HEAD:main
