name: Publish to WinGet
on:
  release:
    types: [published]

jobs:
  winget:
    name: Publish to WinGet
    runs-on: ubuntu-latest
    steps:
      - name: Submit package to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: saraansx.Lune
          installers-regex: 'Lune-Setup-.*\.exe$' 
          token: ${{ secrets.WINGET_GH_TOKEN }}
          max-retries: 10