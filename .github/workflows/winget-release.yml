name: Publish to WinGet
on:
  release:
    types: [published]

jobs:
  winget:
    name: Publish to WinGet
    runs-on: ubuntu-latest
    steps:
      - name: Submit package to WinGet
        uses: vedantatkapoor/winget-releaser@v2
        with:
          identifier: saraansx.Lune
          installers-regex: '\.exe$' # Focuses on the .exe setup file
          token: ${{ secrets.WINGET_GH_TOKEN }}
